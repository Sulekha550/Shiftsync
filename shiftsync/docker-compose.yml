version: '3.9'

services:
  mongo:
    image: mongo:7.0
    container_name: shiftsync-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: shiftsync
    networks:
      - shiftsync-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shiftsync-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      NODE_ENV: production
      MONGO_URI: mongodb://mongo:27017/shiftsync
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-changeme_access_secret_production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-changeme_refresh_secret_production}
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_EXPIRES: 7d
      CLIENT_URL: http://localhost:5173
    depends_on:
      - mongo
    networks:
      - shiftsync-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shiftsync-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - shiftsync-net

volumes:
  mongo_data:

networks:
  shiftsync-net:
    driver: bridge
